apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wm-demo
  namespace: wm-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wm-demo
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60     # scale out when average CPU > 60%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120   # don't thrash — wait 2 min before scaling in
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
