apiVersion: v1
kind: Namespace
metadata:
  name: weedmaps-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weedmaps-demo
  namespace: weedmaps-demo
  labels:
    app: weedmaps-demo
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weedmaps-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # zero-downtime — required for multiple deploys/day
      maxSurge: 1
  template:
    metadata:
      labels:
        app: weedmaps-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: ghcr.io/YOUR_ORG/weedmaps-sre-demo:latest
          ports:
            - containerPort: 8080
          env:
            - name: OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
