name: CI

# Triggers on every push/PR to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Lint + unit tests ──────────────────────────────────────────────
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/requirements.txt ruff pytest

      - name: Lint — ruff
        run: ruff check app/ --ignore E501

      - name: Unit tests — pytest
        run: pytest app/tests/ -v --tb=short

  # ── Stage 2a: SAST (parallel with build) ────────────────────────────────────
  sast:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: SAST — Bandit (medium+ severity, report-only)
        run: bandit -r app/ -ll -q --exit-zero

  # ── Stage 2b: Docker build + Trivy CVE scan (parallel with sast) ────────────
  build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t wm-sre-demo:${{ github.sha }} app/

      - name: Trivy — CVE scan (CRITICAL/HIGH, report-only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: wm-sre-demo:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true
