groups:
  - name: golden-signals
    rules:
      # ── LATENCY ────────────────────────────────────────────────────────────
      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="weedmaps-demo"}[5m])) by (le, endpoint)
          ) > 0.5
        for: 3m
        labels:
          severity: warning
          signal: latency
        annotations:
          summary: "p99 latency above 500ms on {{ $labels.endpoint }}"
          description: "p99={{ $value | humanizeDuration }} — investigate slow queries or memory pressure"

      # ── TRAFFIC ────────────────────────────────────────────────────────────
      - alert: TrafficSpike
        expr: |
          sum(rate(http_requests_total{job="weedmaps-demo"}[5m]))
          > 2 * sum(rate(http_requests_total{job="weedmaps-demo"}[30m]))
        for: 2m
        labels:
          severity: warning
          signal: traffic
        annotations:
          summary: "Request rate 2× above 30-min baseline"
          description: "Current rate={{ $value | humanize }} rps — possible bot traffic or viral event"

      # ── ERRORS ─────────────────────────────────────────────────────────────
      - alert: ErrorRateHigh
        expr: |
          sum(rate(http_requests_total{job="weedmaps-demo", status_code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="weedmaps-demo"}[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
          signal: errors
        annotations:
          summary: "Error rate above 1% SLO threshold"
          description: "Error rate={{ $value | humanizePercentage }} — error budget burning fast"

      - alert: SLOErrorBudgetBurning
        expr: |
          (
            1 - (
              sum(rate(http_requests_total{job="weedmaps-demo", status_code=~"5.."}[1h]))
              /
              sum(rate(http_requests_total{job="weedmaps-demo"}[1h]))
            )
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          signal: slo
        annotations:
          summary: "SLO breach — success rate below 99.9%"
          description: "Measured success rate={{ $value | humanizePercentage }}. At this burn rate the monthly error budget will be exhausted in < 1 day."

      # ── SATURATION ─────────────────────────────────────────────────────────
      - alert: HighConcurrency
        expr: http_requests_in_flight{job="weedmaps-demo"} > 50
        for: 1m
        labels:
          severity: warning
          signal: saturation
        annotations:
          summary: "In-flight requests > 50 — service may be saturated"
          description: "in_flight={{ $value }} — consider scaling up or investigating slow queries"
